name: Build and Deploy to GKE

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GKE_CLUSTER: devops-cluster-v2
  GKE_REGION: us-central1
  IMAGE: ai-devops-consulting
  GAR_LOCATION: us-central1
  REPOSITORY: devops-repo

permissions:
  contents: 'read'
  id-token: 'write'

jobs:
  build:
    name: Build and Push Image
    runs-on: ubuntu-latest
    outputs:
      image_name: ${{ steps.build-image.outputs.image_name }}
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - id: 'auth'
      uses: 'google-github-actions/auth@v2'
      with:
        workload_identity_provider: 'projects/840549873072/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
        service_account: 'github-actions-deployer@demos-490411.iam.gserviceaccount.com'

    - name: Authorize Docker
      run: gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev

    - id: build-image
      name: Build and Push Docker Image
      run: |
        FULL_IMAGE_NAME="${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:${{ github.sha }}"
        docker build \
          --platform linux/amd64 \
          -t $FULL_IMAGE_NAME \
          -t ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:latest \
          .
        docker push $FULL_IMAGE_NAME
        docker push ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:latest
        echo "image_name=$FULL_IMAGE_NAME" >> $GITHUB_OUTPUT

  deploy:
    name: Deploy to GKE
    needs: build
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - id: 'auth'
      uses: 'google-github-actions/auth@v2'
      with:
        workload_identity_provider: 'projects/840549873072/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
        service_account: 'github-actions-deployer@demos-490411.iam.gserviceaccount.com'

    - name: Set up GKE credentials
      uses: google-github-actions/get-gke-credentials@v2
      with:
        cluster_name: ${{ env.GKE_CLUSTER }}
        location: ${{ env.GKE_REGION }}

    - name: Deploy to GKE
      run: |
        IMAGE_NAME="${{ needs.build.outputs.image_name }}"
        sed -i "s|IMAGE_URL_PLACEHOLDER|$IMAGE_NAME|g" k8s/deployment.yaml
        kubectl apply -f k8s/deployment.yaml
        kubectl apply -f k8s/service.yaml
        kubectl apply -f k8s/gateway-api.yaml
        kubectl rollout status deployment/devopswithai-frontend

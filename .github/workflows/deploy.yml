name: Build and Deploy to GKE

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GKE_CLUSTER: devops-cluster-v2
  GKE_REGION: us-central1
  IMAGE: ai-devops-consulting
  GAR_LOCATION: us-central1
  REPOSITORY: devops-repo

permissions:
  contents: 'write'
  id-token: 'write'

jobs:
  build:
    name: Build and Push Image
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Needed for changelog generation

    - id: 'auth'
      uses: 'google-github-actions/auth@v2'
      with:
        workload_identity_provider: 'projects/840549873072/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
        service_account: 'github-actions-deployer@demos-490411.iam.gserviceaccount.com'

    - name: Authorize Docker
      run: gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev

    - name: Determine Tags
      id: meta
      run: |
        VERSION="latest"
        if [[ $GITHUB_REF == refs/tags/* ]]; then
          VERSION=${GITHUB_REF#refs/tags/}
        fi
        echo "version=$VERSION" >> $GITHUB_OUTPUT

    - name: Build and Push Docker Image
      run: |
        FULL_IMAGE_NAME="${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:${{ github.sha }}"
        TAG_IMAGE_NAME="${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:${{ steps.meta.outputs.version }}"
        
        docker build \
          --platform linux/amd64 \
          -t $FULL_IMAGE_NAME \
          -t $TAG_IMAGE_NAME \
          .
        
        docker push $FULL_IMAGE_NAME
        docker push $TAG_IMAGE_NAME

  deploy:
    name: Deploy to GKE
    needs: build
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - id: 'auth'
      uses: 'google-github-actions/auth@v2'
      with:
        workload_identity_provider: 'projects/840549873072/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
        service_account: 'github-actions-deployer@demos-490411.iam.gserviceaccount.com'

    - name: Set up GKE credentials
      uses: google-github-actions/get-gke-credentials@v2
      with:
        cluster_name: ${{ env.GKE_CLUSTER }}
        location: ${{ env.GKE_REGION }}

    - name: Deploy to GKE
      run: |
        IMAGE_NAME="${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:${{ github.sha }}"
        sed -i "s|IMAGE_URL_PLACEHOLDER|$IMAGE_NAME|g" k8s/frontend/deployment.yaml
        kubectl apply -f k8s/frontend/deployment.yaml
        kubectl apply -f k8s/frontend/service.yaml
        kubectl apply -f k8s/gateway/gateway-api.yaml
        kubectl rollout status deployment/devopswithai-frontend

  create-release:
    name: Create GitHub Release
    needs: [build, deploy]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## 🚀 Production Deployment
            This release was automatically built and deployed to GKE.
            
            **Image Tag:** `${{ github.ref_name }}`
            **Environment:** Production

# Azure Application Gateway Ingress Controller (AGIC) Configuration
# Prerequisites:
# 1. Application Gateway Ingress Controller enabled on your AKS cluster
# 2. SSL certificate stored in Azure Key Vault or as a Kubernetes Secret

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: devopswithai-ingress-azure
  namespace: default
  annotations:
    kubernetes.io/ingress.class: azure/application-gateway
    appgw.ingress.kubernetes.io/ssl-redirect: "true"
    # If using Azure Key Vault, uncomment and configure below:
    # appgw.ingress.kubernetes.io/appgw-ssl-certificate: "your-appgw-cert-name"
spec:
  tls:
  - hosts:
    - devopswithai.in
    - www.devopswithai.in
    secretName: devopswithai-tls-secret # Ensure this secret exists with your SSL cert if not using Key Vault directly
  rules:
  - host: devopswithai.in
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: devopswithai-service
            port:
              number: 80
  - host: www.devopswithai.in
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: devopswithai-service
            port:
              number: 80

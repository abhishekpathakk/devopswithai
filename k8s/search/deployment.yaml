apiVersion: apps/v1
kind: Deployment
metadata:
  name: search-api-deployment
  labels:
    app: search-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: search-api
  template:
    metadata:
      labels:
        app: search-api
    spec:
      containers:
      - name: search-api
        # Replace with your Docker Hub image once built (e.g., abhishekpathak1111/devopswithai-search:v5)
        image: abhishekpathak1111/devopswithai-search:v5
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 250m
            memory: 256Mi
